<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>いろあわせ</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(160deg, #6a3093 0%, #a044ff 45%, #ec38bc 100%);
      height: 100svh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 20px 12px 28px;
      overflow: hidden;
      font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDGothic', 'Rounded Mplus 1c', sans-serif;
    }

    /* ===== ヘッダー ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 780px;
      flex-shrink: 0;
    }
    .back-btn {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: clamp(0.82rem, 2.4vw, 1.05rem);
      background: rgba(255,255,255,0.15);
      border: none; border-radius: 30px;
      padding: 8px 16px; cursor: pointer;
      letter-spacing: 0.06em; flex-shrink: 0;
    }
    .title {
      color: #fff;
      font-size: clamp(1.4rem, 4.5vw, 2.4rem);
      text-shadow: 0 3px 10px rgba(0,0,0,0.3);
      letter-spacing: 0.12em;
    }
    .sound-btn {
      background: rgba(255,255,255,0.15);
      border: none; border-radius: 50%;
      width: clamp(40px,8.5vw,56px);
      height: clamp(40px,8.5vw,56px);
      font-size: clamp(1.1rem,2.8vw,1.6rem);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.15s;
      flex-shrink: 0;
    }
    .sound-btn:active { transform: scale(0.88); }
    .sound-btn.muted  { background: rgba(255,80,80,0.35); }

    /* ===== 穴エリア ===== */
    .holes-row {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(10px, 3vw, 28px);
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
      width: 100%;
      max-width: 780px;
    }

    .hole-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .hole {
      width:  clamp(90px, 19vw, 150px);
      height: clamp(90px, 19vw, 150px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.10);
      border: 4px solid rgba(255,255,255,0.2);
      position: relative;
      transition: background 0.2s, transform 0.2s;
    }
    .hole.active {
      transform: scale(1.08);
      background: rgba(255,255,255,0.25);
    }

    /* 各色の穴リング */
    .hole-hint {
      width: 78%; height: 78%;
      border-radius: 50%;
      border-width: 6px;
      border-style: dashed;
    }
    .hole[data-color="red"]    .hole-hint { border-color: #ff5252; }
    .hole[data-color="blue"]   .hole-hint { border-color: #40c4ff; }
    .hole[data-color="yellow"] .hole-hint { border-color: #ffea00; }
    .hole[data-color="green"]  .hole-hint { border-color: #69f0ae; }

    .hole-label {
      color: rgba(255,255,255,0.92);
      font-size: clamp(0.9rem, 2.8vw, 1.25rem);
      font-weight: bold;
      letter-spacing: 0.08em;
    }

    /* ===== ピースエリア ===== */
    .pieces-row {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(10px, 3vw, 28px);
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
      width: 100%;
      max-width: 780px;
    }

    .piece-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .piece {
      touch-action: none;
      cursor: grab;
      border-radius: 50%;
      width:  clamp(84px, 18vw, 138px);
      height: clamp(84px, 18vw, 138px);
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(2.2rem, 5.5vw, 3.5rem);
      position: relative;
      transition: filter 0.15s, box-shadow 0.15s;
    }
    .piece.dragging { cursor: grabbing; filter: brightness(1.18); z-index: 500; }
    .piece[data-placed="true"] { visibility: hidden; pointer-events: none; }

    /* 各色ピース */
    .piece[data-color="red"] {
      background: radial-gradient(circle at 35% 30%, #ff8a80, #e53935);
      box-shadow: 0 10px 28px rgba(229,57,53,0.55), inset 0 -4px 8px rgba(0,0,0,0.2);
    }
    .piece[data-color="blue"] {
      background: radial-gradient(circle at 35% 30%, #82b1ff, #1565c0);
      box-shadow: 0 10px 28px rgba(21,101,192,0.55), inset 0 -4px 8px rgba(0,0,0,0.2);
    }
    .piece[data-color="yellow"] {
      background: radial-gradient(circle at 35% 30%, #fff59d, #f9a825);
      box-shadow: 0 10px 28px rgba(249,168,37,0.6), inset 0 -4px 8px rgba(0,0,0,0.15);
    }
    .piece[data-color="green"] {
      background: radial-gradient(circle at 35% 30%, #b9f6ca, #2e7d32);
      box-shadow: 0 10px 28px rgba(46,125,50,0.55), inset 0 -4px 8px rgba(0,0,0,0.2);
    }

    .piece-label {
      color: rgba(255,255,255,0.92);
      font-size: clamp(0.9rem, 2.8vw, 1.25rem);
      font-weight: bold;
      letter-spacing: 0.08em;
    }

    /* ===== 配置済み ===== */
    .placed-dot {
      width: 72%; height: 72%;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(1.6rem, 4.5vw, 2.6rem);
    }
    .placed-dot.red    { background: radial-gradient(circle at 35% 30%,#ff8a80,#e53935); box-shadow:0 6px 18px rgba(229,57,53,0.5); }
    .placed-dot.blue   { background: radial-gradient(circle at 35% 30%,#82b1ff,#1565c0); box-shadow:0 6px 18px rgba(21,101,192,0.5); }
    .placed-dot.yellow { background: radial-gradient(circle at 35% 30%,#fff59d,#f9a825); box-shadow:0 6px 18px rgba(249,168,37,0.55); }
    .placed-dot.green  { background: radial-gradient(circle at 35% 30%,#b9f6ca,#2e7d32); box-shadow:0 6px 18px rgba(46,125,50,0.5); }

    /* ===== クリア ===== */
    #celebration {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 900;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 24px;
    }
    #celebration.show { display: flex; }
    .cel-big  { font-size: clamp(3.5rem,12vw,6.5rem); animation: pop 0.4s ease-out both; }
    .cel-text {
      color: #fff; font-size: clamp(2rem,7vw,4rem);
      text-align: center; text-shadow: 0 3px 12px rgba(0,0,0,0.4);
      animation: pop 0.4s 0.2s ease-out both; line-height: 1.4;
    }
    .retry-btn {
      padding: clamp(14px,3.5vw,22px) clamp(36px,9vw,70px);
      font-size: clamp(1.3rem,4.2vw,2.2rem); font-family: inherit;
      background: linear-gradient(135deg,#a044ff,#ec38bc);
      color: #fff; border: none; border-radius: 60px; cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,0.32);
      animation: pop 0.4s 0.45s ease-out both; letter-spacing: 0.1em;
    }
    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    /* ===== 星 ===== */
    .star {
      position: fixed; pointer-events: none;
      font-size: clamp(1.4rem,4vw,2.2rem);
      animation: fly-star 0.9s ease-out forwards; z-index: 800;
    }
    @keyframes fly-star {
      from { transform: translate(0,0) scale(0.2); opacity: 1; }
      to   { transform: translate(var(--dx),var(--dy)) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="header">
    <a class="back-btn" href="../../">← もどる</a>
    <div class="title">🎨 いろあわせ</div>
    <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>
  </div>

  <!-- 穴（色ターゲット）-->
  <div class="holes-row">
    <div class="hole-wrapper">
      <div class="hole" id="hole-red" data-color="red">
        <div class="hole-hint"></div>
      </div>
      <div class="hole-label">あか</div>
    </div>
    <div class="hole-wrapper">
      <div class="hole" id="hole-blue" data-color="blue">
        <div class="hole-hint"></div>
      </div>
      <div class="hole-label">あお</div>
    </div>
    <div class="hole-wrapper">
      <div class="hole" id="hole-yellow" data-color="yellow">
        <div class="hole-hint"></div>
      </div>
      <div class="hole-label">きいろ</div>
    </div>
    <div class="hole-wrapper">
      <div class="hole" id="hole-green" data-color="green">
        <div class="hole-hint"></div>
      </div>
      <div class="hole-label">みどり</div>
    </div>
  </div>

  <!-- ピース（並び順をずらす）-->
  <div class="pieces-row">
    <div class="piece-wrapper">
      <div class="piece" id="piece-green" data-color="green">🌿</div>
      <div class="piece-label">みどり</div>
    </div>
    <div class="piece-wrapper">
      <div class="piece" id="piece-red" data-color="red">🍎</div>
      <div class="piece-label">あか</div>
    </div>
    <div class="piece-wrapper">
      <div class="piece" id="piece-yellow" data-color="yellow">⭐</div>
      <div class="piece-label">きいろ</div>
    </div>
    <div class="piece-wrapper">
      <div class="piece" id="piece-blue" data-color="blue">💧</div>
      <div class="piece-label">あお</div>
    </div>
  </div>

  <div id="celebration">
    <div class="cel-big">🎉🌈🎊</div>
    <div class="cel-text">すごい！<br>ぜんぶできたよ！</div>
    <button class="retry-btn" onclick="resetGame()">もういちど！</button>
  </div>

<script>
/* =====================================================
   サウンドマネージャー（Web Audio API）
===================================================== */
const Sound = (() => {
  let ctx = null, muted = false, bgmTimeout = null, bgmPlaying = false;

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function tone(freq, start, dur, vol = 0.2, type = 'sine') {
    if (muted) return;
    const c = getCtx();
    const osc = c.createOscillator(), gain = c.createGain();
    osc.connect(gain); gain.connect(c.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, start);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    osc.start(start); osc.stop(start + dur + 0.05);
  }

  /* BGM ─ 明るいポップ調ループ（Fメジャー） */
  const BPM = 116, BEAT = 60 / BPM;
  const MELODY = [
    [698,0.5],[698,0.5],[784,0.5],[698,0.5],[880,1.0],[784,0.5],[698,0.5],
    [587,0.5],[659,0.5],[698,0.5],[587,0.5],[523,1.5],[523,0.5],
    [784,0.5],[880,0.5],[988,0.5],[880,0.5],[784,1.0],[698,0.5],[659,0.5],
    [698,0.5],[587,0.5],[523,0.5],[587,0.5],[698,2.0],
  ];
  const BASS = [
    [175,0.4],[175,0.4],[196,0.4],[196,0.4],
    [220,0.4],[220,0.4],[175,0.4],[175,0.4],
    [196,0.4],[196,0.4],[220,0.4],[220,0.4],
    [175,0.4],[175,0.4],[175,0.8],
  ];

  function playBGMBlock(startTime) {
    if (muted || !bgmPlaying) return;
    let t = startTime;
    MELODY.forEach(([f,b]) => { tone(f, t, b*BEAT*0.72, 0.065,'sine'); t += b*BEAT; });
    const loopLen = t - startTime;
    let bt = startTime;
    BASS.forEach(([f,b]) => { tone(f, bt, b*BEAT*1.8, 0.045,'triangle'); bt += BEAT*2; });
    bgmTimeout = setTimeout(() => playBGMBlock(getCtx().currentTime + 0.05), loopLen*1000 - 80);
  }

  function startBGM() {
    if (bgmPlaying || muted) return;
    bgmPlaying = true;
    playBGMBlock(getCtx().currentTime + 0.1);
  }
  function stopBGM() {
    bgmPlaying = false;
    if (bgmTimeout) { clearTimeout(bgmTimeout); bgmTimeout = null; }
  }

  /* 効果音 */
  function sfxPickup() {
    const c=getCtx(), t=c.currentTime;
    tone(494, t,     0.06, 0.12,'sine');
    tone(587, t+0.04,0.07, 0.12,'sine');
  }
  function sfxCorrect() {
    const c=getCtx(), t=c.currentTime;
    [587,740,880].forEach((f,i) => tone(f, t+i*0.1, 0.28, 0.22,'sine'));
  }
  function sfxWrong() {
    const c=getCtx(), t=c.currentTime;
    tone(260, t,     0.1, 0.18,'sawtooth');
    tone(230, t+0.08,0.1, 0.14,'sawtooth');
  }
  function sfxFanfare() {
    const c=getCtx(), t=c.currentTime;
    [587,740,880,1175,1480].forEach((f,i) => tone(f, t+i*0.1, 0.28, 0.17,'sine'));
    [587,740,880].forEach(f => tone(f, t+0.7, 0.8, 0.13,'sine'));
    [2349,2960].forEach((f,i) => tone(f, t+0.5+i*0.12, 0.2, 0.05,'sine'));
  }

  function setMuted(val) { muted=val; if(muted) stopBGM(); else startBGM(); }
  function isMuted()     { return muted; }

  return { startBGM, stopBGM, sfxPickup, sfxCorrect, sfxWrong, sfxFanfare, setMuted, isMuted };
})();

function toggleSound() {
  const btn = document.getElementById('soundBtn');
  Sound.setMuted(!Sound.isMuted());
  btn.textContent = Sound.isMuted() ? '🔇' : '🔊';
  btn.classList.toggle('muted', Sound.isMuted());
}

/* =====================================================
   ゲームロジック
===================================================== */
const COLORS = ['red','blue','yellow','green'];
let active=null, startPX=0, startPY=0, curDX=0, curDY=0, placed=0;

document.querySelectorAll('.piece').forEach(p => p.addEventListener('pointerdown', onDown));
document.addEventListener('pointermove', onMove);
document.addEventListener('pointerup',   onUp);
document.addEventListener('pointercancel', onUp);
document.addEventListener('pointerdown', () => Sound.startBGM(), { once: true });

function onDown(e) {
  e.preventDefault();
  const piece = e.currentTarget;
  if (piece.dataset.placed === 'true') return;
  Sound.sfxPickup();
  active = piece;
  startPX = e.clientX; startPY = e.clientY;
  curDX = curDY = 0;
  piece.style.zIndex = '500';
  piece.style.transition = 'none';
  piece.classList.add('dragging');
  piece.setPointerCapture(e.pointerId);
  highlightHole(piece.dataset.color, true);
}

function onMove(e) {
  if (!active) return;
  e.preventDefault();
  curDX = e.clientX - startPX;
  curDY = e.clientY - startPY;
  active.style.transform = `translate(${curDX}px,${curDY}px) scale(1.1)`;
}

function onUp(e) {
  if (!active) return;
  const piece = active; active = null;
  piece.classList.remove('dragging');
  highlightHole(piece.dataset.color, false);

  const r   = piece.getBoundingClientRect();
  const pcx = r.left + r.width  / 2;
  const pcy = r.top  + r.height / 2;
  const hole = document.getElementById('hole-' + piece.dataset.color);
  const hr  = hole.getBoundingClientRect();
  const hit = pcx >= hr.left && pcx <= hr.right && pcy >= hr.top && pcy <= hr.bottom;

  hit ? snapIn(piece, hole, hr, r) : snapBack(piece);
}

function snapIn(piece, hole, hr, pr) {
  const dx = (hr.left + hr.width/2)  - (pr.left + pr.width/2);
  const dy = (hr.top  + hr.height/2) - (pr.top  + pr.height/2);
  piece.style.transition = 'transform 0.22s cubic-bezier(0.34,1.56,0.64,1)';
  piece.style.transform  = `translate(${curDX+dx}px,${curDY+dy}px) scale(0.80)`;
  Sound.sfxCorrect();
  setTimeout(() => {
    piece.dataset.placed = 'true';
    hole.innerHTML = placedHTML(piece.dataset.color);
    spawnStars(hr, piece.dataset.color);
    placed++;
    if (placed === 4) {
      setTimeout(() => {
        Sound.stopBGM();
        Sound.sfxFanfare();
        document.getElementById('celebration').classList.add('show');
      }, 400);
    }
  }, 220);
}

function snapBack(piece) {
  Sound.sfxWrong();
  piece.style.transition = 'transform 0.38s cubic-bezier(0.68,-0.55,0.27,1.55)';
  piece.style.transform  = 'translate(0,0) scale(1)';
  setTimeout(() => { piece.style.zIndex=''; piece.style.transition=''; }, 380);
}

function highlightHole(color, on) {
  const h = document.getElementById('hole-' + color);
  if (h) h.classList.toggle('active', on);
}

function placedHTML(color) {
  const emoji = { red:'🍎', blue:'💧', yellow:'⭐', green:'🌿' };
  return `<div class="placed-dot ${color}">${emoji[color]}</div>`;
}

/* 色に合わせた星エフェクト */
const COLOR_STARS = {
  red:    ['🔴','❤️','🌹','✨','💫'],
  blue:   ['🔵','💙','💧','✨','💫'],
  yellow: ['🟡','⭐','🌟','✨','💛'],
  green:  ['🟢','💚','🌿','✨','🍀'],
};

function spawnStars(hr, color) {
  const cx = hr.left + hr.width/2, cy = hr.top + hr.height/2;
  const em = COLOR_STARS[color] || ['✨','🌟','💫'];
  for (let i = 0; i < 12; i++) {
    const el = document.createElement('div');
    el.className = 'star';
    el.textContent = em[i % em.length];
    const ang = (i/12)*Math.PI*2 + Math.random()*0.4;
    const d   = 65 + Math.random()*85;
    el.style.left = cx+'px'; el.style.top = cy+'px';
    el.style.setProperty('--dx', Math.cos(ang)*d+'px');
    el.style.setProperty('--dy', Math.sin(ang)*d+'px');
    el.style.animationDelay = (i*0.04)+'s';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 950);
  }
}

function resetGame() {
  placed = 0;
  document.getElementById('celebration').classList.remove('show');
  COLORS.forEach(c => {
    document.getElementById('hole-'+c).innerHTML = '<div class="hole-hint"></div>';
  });
  document.querySelectorAll('.piece').forEach(p => {
    delete p.dataset.placed;
    p.style.cssText = ''; p.style.visibility = '';
  });
  Sound.startBGM();
}
</script>
</body>
</html>

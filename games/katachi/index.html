<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>かたちあわせ</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(160deg, #43C6AC 0%, #191654 100%);
      height: 100svh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 24px 16px 32px;
      overflow: hidden;
      font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDGothic', 'Rounded Mplus 1c', sans-serif;
    }

    /* ===== ヘッダー ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 640px;
      flex-shrink: 0;
    }
    .back-btn {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: clamp(0.85rem, 2.5vw, 1.1rem);
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 30px;
      padding: 8px 18px;
      cursor: pointer;
      letter-spacing: 0.06em;
    }
    .title {
      color: #fff;
      font-size: clamp(1.4rem, 4.5vw, 2.4rem);
      text-shadow: 0 3px 10px rgba(0,0,0,0.3);
      letter-spacing: 0.12em;
    }
    .spacer { width: 80px; }

    /* ===== 穴エリア ===== */
    .holes-row {
      display: flex;
      gap: clamp(14px, 4.5vw, 50px);
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }

    .hole-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .hole {
      width:  clamp(108px, 25vw, 175px);
      height: clamp(108px, 25vw, 175px);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 22px;
      background: rgba(255,255,255,0.12);
      border: 3px solid rgba(255,255,255,0.25);
      position: relative;
      transition: background 0.2s, border-color 0.2s;
    }
    .hole.active {
      background: rgba(255,255,255,0.28);
      border-color: rgba(255,255,255,0.7);
    }
    .hole-label {
      color: rgba(255,255,255,0.92);
      font-size: clamp(0.95rem, 3vw, 1.35rem);
      font-weight: bold;
      letter-spacing: 0.08em;
    }

    /* 穴アウトライン */
    .hint-circle {
      width: 72%; height: 72%;
      border-radius: 50%;
      border: 5px dashed rgba(255,255,255,0.55);
    }
    .hint-triangle {
      width: 0; height: 0;
      border-left:  clamp(34px, 8vw, 58px) solid transparent;
      border-right: clamp(34px, 8vw, 58px) solid transparent;
      border-bottom: clamp(59px,13.8vw,100px) solid rgba(255,255,255,0.55);
    }
    .hint-square {
      width: 70%; height: 70%;
      border: 5px dashed rgba(255,255,255,0.55);
      border-radius: 10px;
    }

    /* ===== ピースエリア ===== */
    .pieces-row {
      display: flex;
      gap: clamp(14px, 4.5vw, 50px);
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }
    .piece-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .piece {
      touch-action: none;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      width:  clamp(98px, 23vw, 158px);
      height: clamp(98px, 23vw, 158px);
      position: relative;
      transition: filter 0.15s;
    }
    .piece.dragging { cursor: grabbing; filter: brightness(1.15); }
    .piece[data-placed="true"] { visibility: hidden; pointer-events: none; }
    .piece-label {
      color: rgba(255,255,255,0.92);
      font-size: clamp(0.95rem, 3vw, 1.35rem);
      font-weight: bold;
      letter-spacing: 0.08em;
    }

    /* ===== 形状 ===== */
    .s-circle {
      width: 85%; height: 85%;
      border-radius: 50%;
      background: radial-gradient(circle at 32% 28%, #ff9a9a, #e53935);
      box-shadow: 0 10px 30px rgba(229,57,53,0.55), inset 0 -5px 10px rgba(0,0,0,0.18);
    }
    .s-triangle-wrap {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%;
    }
    .s-triangle {
      width: 0; height: 0;
      border-left:  clamp(42px,10vw,70px) solid transparent;
      border-right: clamp(42px,10vw,70px) solid transparent;
      border-bottom: clamp(73px,17.3vw,121px) solid #FDD835;
      filter: drop-shadow(0 10px 18px rgba(253,216,53,0.6));
    }
    .s-square {
      width: 82%; height: 82%;
      background: linear-gradient(135deg, #64d8f5, #0288D1);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(2,136,209,0.55), inset 0 -5px 10px rgba(0,0,0,0.18);
    }

    /* ===== クリア ===== */
    #celebration {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 900;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 24px;
    }
    #celebration.show { display: flex; }
    .cel-big   { font-size: clamp(3.5rem,12vw,6.5rem); animation: pop 0.4s ease-out both; }
    .cel-text  {
      color: #fff; font-size: clamp(2rem,7vw,4rem);
      text-align: center; text-shadow: 0 3px 12px rgba(0,0,0,0.4);
      animation: pop 0.4s 0.2s ease-out both; line-height: 1.4;
    }
    .retry-btn {
      padding: clamp(14px,3.5vw,22px) clamp(36px,9vw,70px);
      font-size: clamp(1.3rem,4.2vw,2.2rem); font-family: inherit;
      background: linear-gradient(135deg,#FF6B6B,#c62828);
      color: #fff; border: none; border-radius: 60px; cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,0.32);
      animation: pop 0.4s 0.45s ease-out both; letter-spacing: 0.1em;
    }
    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    /* 星 */
    .star {
      position: fixed; pointer-events: none;
      font-size: clamp(1.4rem,4vw,2.2rem);
      animation: fly-star 0.9s ease-out forwards; z-index: 800;
    }
    @keyframes fly-star {
      from { transform: translate(0,0) scale(0.2); opacity: 1; }
      to   { transform: translate(var(--dx),var(--dy)) scale(1); opacity: 0; }
    }

    /* 穴に置かれた形 */
    .placed-circle {
      width:75%;height:75%;border-radius:50%;
      background:radial-gradient(circle at 32% 28%,#ff9a9a,#e53935);
      box-shadow:0 6px 20px rgba(229,57,53,0.4);
      display:flex;align-items:center;justify-content:center;
      font-size:clamp(1.5rem,4vw,2.5rem);
    }
    .placed-triangle {
      display:flex;align-items:center;justify-content:center;
      width:100%;height:100%;
      font-size:clamp(4rem,9.5vw,6.5rem);
      color:#FDD835;filter:drop-shadow(0 6px 12px rgba(253,216,53,0.55));
    }
    .placed-square {
      width:73%;height:73%;border-radius:12px;
      background:linear-gradient(135deg,#64d8f5,#0288D1);
      box-shadow:0 6px 20px rgba(2,136,209,0.4);
      display:flex;align-items:center;justify-content:center;
      font-size:clamp(1.5rem,4vw,2.5rem);
    }
  </style>
</head>
<body>

  <div class="header">
    <a class="back-btn" href="../../">← もどる</a>
    <div class="title">🎮 かたちあわせ</div>
    <div class="spacer"></div>
  </div>

  <!-- 穴 -->
  <div class="holes-row">
    <div class="hole-wrapper">
      <div class="hole" id="hole-circle" data-shape="circle">
        <div class="hint-circle"></div>
      </div>
      <div class="hole-label">まる</div>
    </div>
    <div class="hole-wrapper">
      <div class="hole" id="hole-triangle" data-shape="triangle">
        <div class="hint-triangle"></div>
      </div>
      <div class="hole-label">さんかく</div>
    </div>
    <div class="hole-wrapper">
      <div class="hole" id="hole-square" data-shape="square">
        <div class="hint-square"></div>
      </div>
      <div class="hole-label">しかく</div>
    </div>
  </div>

  <!-- ピース（並び順をずらして配置） -->
  <div class="pieces-row">
    <div class="piece-wrapper">
      <div class="piece" id="piece-square" data-shape="square">
        <div class="s-square"></div>
      </div>
      <div class="piece-label">しかく</div>
    </div>
    <div class="piece-wrapper">
      <div class="piece" id="piece-circle" data-shape="circle">
        <div class="s-circle"></div>
      </div>
      <div class="piece-label">まる</div>
    </div>
    <div class="piece-wrapper">
      <div class="piece" id="piece-triangle" data-shape="triangle">
        <div class="s-triangle-wrap"><div class="s-triangle"></div></div>
      </div>
      <div class="piece-label">さんかく</div>
    </div>
  </div>

  <div id="celebration">
    <div class="cel-big">🎉🌟🎊</div>
    <div class="cel-text">すごい！<br>ぜんぶできたよ！</div>
    <button class="retry-btn" onclick="resetGame()">もういちど！</button>
  </div>

<script>
  let active=null, startPX=0, startPY=0, curDX=0, curDY=0, placed=0;

  document.querySelectorAll('.piece').forEach(p => p.addEventListener('pointerdown', onDown));
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup',   onUp);
  document.addEventListener('pointercancel', onUp);

  function onDown(e) {
    e.preventDefault();
    const piece = e.currentTarget;
    if (piece.dataset.placed === 'true') return;
    active = piece;
    startPX = e.clientX; startPY = e.clientY;
    curDX = curDY = 0;
    piece.style.zIndex = '500';
    piece.style.transition = 'none';
    piece.classList.add('dragging');
    piece.setPointerCapture(e.pointerId);
    highlightHole(piece.dataset.shape, true);
  }

  function onMove(e) {
    if (!active) return;
    e.preventDefault();
    curDX = e.clientX - startPX;
    curDY = e.clientY - startPY;
    active.style.transform = `translate(${curDX}px,${curDY}px) scale(1.08)`;
  }

  function onUp(e) {
    if (!active) return;
    const piece = active; active = null;
    piece.classList.remove('dragging');
    highlightHole(piece.dataset.shape, false);

    const r   = piece.getBoundingClientRect();
    const pcx = r.left + r.width  / 2;
    const pcy = r.top  + r.height / 2;
    const hole = document.getElementById('hole-' + piece.dataset.shape);
    const hr  = hole.getBoundingClientRect();
    const hit = pcx >= hr.left && pcx <= hr.right && pcy >= hr.top && pcy <= hr.bottom;

    hit ? snapIn(piece, hole, hr, r) : snapBack(piece);
  }

  function snapIn(piece, hole, hr, pr) {
    const dx = (hr.left + hr.width/2) - (pr.left + pr.width/2);
    const dy = (hr.top + hr.height/2) - (pr.top + pr.height/2);
    piece.style.transition = 'transform 0.22s cubic-bezier(0.34,1.56,0.64,1)';
    piece.style.transform  = `translate(${curDX+dx}px,${curDY+dy}px) scale(0.82)`;
    playNote([523,659,784]);
    setTimeout(() => {
      piece.dataset.placed = 'true';
      hole.innerHTML = placedHTML(piece.dataset.shape);
      spawnStars(hr);
      placed++;
      if (placed === 3) setTimeout(() => {
        document.getElementById('celebration').classList.add('show');
        playNote([523,659,784,1047], 0.15);
      }, 500);
    }, 220);
  }

  function snapBack(piece) {
    piece.style.transition = 'transform 0.38s cubic-bezier(0.68,-0.55,0.27,1.55)';
    piece.style.transform  = 'translate(0,0) scale(1)';
    setTimeout(() => { piece.style.zIndex=''; piece.style.transition=''; }, 380);
  }

  function highlightHole(shape, on) {
    const h = document.getElementById('hole-' + shape);
    if (h) h.classList.toggle('active', on);
  }

  function placedHTML(shape) {
    if (shape==='circle')   return '<div class="placed-circle">✓</div>';
    if (shape==='triangle') return '<div class="placed-triangle">▲</div>';
    return '<div class="placed-square">✓</div>';
  }

  function spawnStars(hr) {
    const cx=hr.left+hr.width/2, cy=hr.top+hr.height/2;
    const em=['⭐','✨','🌟','💫','🎊'];
    for(let i=0;i<10;i++){
      const el=document.createElement('div');
      el.className='star'; el.textContent=em[i%em.length];
      const ang=(i/10)*Math.PI*2+Math.random()*0.4;
      const d=70+Math.random()*80;
      el.style.left=cx+'px'; el.style.top=cy+'px';
      el.style.setProperty('--dx',Math.cos(ang)*d+'px');
      el.style.setProperty('--dy',Math.sin(ang)*d+'px');
      el.style.animationDelay=(i*0.05)+'s';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),950);
    }
  }

  function playNote(freqs, interval=0.12) {
    try {
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      freqs.forEach((f,i)=>{
        const osc=ctx.createOscillator(), gain=ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value=f; osc.type='sine';
        const t=ctx.currentTime+i*interval;
        gain.gain.setValueAtTime(0.28,t);
        gain.gain.exponentialRampToValueAtTime(0.001,t+0.35);
        osc.start(t); osc.stop(t+0.35);
      });
    } catch(_){}
  }

  function resetGame() {
    placed=0;
    document.getElementById('celebration').classList.remove('show');
    const hints={
      circle:'<div class="hint-circle"></div>',
      triangle:'<div class="hint-triangle"></div>',
      square:'<div class="hint-square"></div>'
    };
    ['circle','triangle','square'].forEach(s=>{
      document.getElementById('hole-'+s).innerHTML=hints[s];
    });
    document.querySelectorAll('.piece').forEach(p=>{
      delete p.dataset.placed;
      p.style.cssText=''; p.style.visibility='';
    });
  }
</script>
</body>
</html>
